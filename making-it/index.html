<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0c">
    <title>Making It</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #161619;
            --border: #2a2a30;
            --muted: #9a9aa5;
            --accent: #1ed760;
            --danger: #ff5c5c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        /* Stop rapid taps on buttons triggering double-tap-to-zoom on mobile. */
        button { touch-action: manipulation; }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: #f2f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            overscroll-behavior-y: none;
            overflow-x: hidden;
        }
        #root { min-height: 100vh; }
        .boot { text-align: center; padding: 4rem 1rem; color: var(--muted); }
    </style>
</head>
<body>
    <div id="root"><div class="boot">Loading the grind…</div></div>
    <script src="./assets/index.mjs" type="module"></script>
</body>
</html>
